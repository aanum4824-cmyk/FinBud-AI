<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinBudAI – Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary-purple: #5c2d91;
            --secondary-purple: #f2f2f2;
            --text-dark: #111;
            --text-light: #fff;
            --bg: var(--secondary-purple);
            --accent: var(--primary-purple);
            --card: #ffffff;
            --danger: #b91c1c;
            --income: #10b981;
            --expense: #ef4444;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            font-family: Inter, ui-sans-serif, system-ui;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-dark);
            min-height: 100vh;
            padding: 0;
        }

        #dashboardContainer {
            transition: filter 0.3s ease-in-out, transform 0.3s ease-in-out;
            min-height: 100vh;
        }

        .blurred-content {
            filter: blur(5px);
            transform: scale(0.98);
            pointer-events: none;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: var(--card);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-purple);
            margin: 0;
        }

        .logo-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary-purple);
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .bell-icon-container {
            position: relative;
            cursor: pointer;
            padding: 8px;
            transition: opacity 0.2s;
        }

        .bell-icon-container:hover {
            opacity: 0.7;
        }

        .bell-icon {
            font-size: 22px;
            color: var(--primary-purple);
        }

        .reminder-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        .reminders-dropdown {
            position: absolute;
            top: 60px;
            right: 40px;
            width: 350px;
            max-height: 400px;
            overflow-y: auto;
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            display: none;
            padding: 20px;
        }

        .reminders-dropdown.visible {
            display: block;
        }

        .reminders-dropdown h3 {
            color: var(--primary-purple);
            font-weight: 700;
            margin: 0 0 15px 0;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .reminder-item {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid var(--warning);
            background: rgba(245, 158, 11, 0.1);
            font-size: 14px;
        }

        .reminder-item.due-soon {
            border-left-color: var(--warning);
            background: rgba(245, 158, 11, 0.1);
        }

        .reminder-item.due-today {
            border-left-color: var(--expense);
            background: rgba(239, 68, 68, 0.1);
        }

        .reminder-item.overdue {
            border-left-color: var(--danger);
            background: rgba(185, 28, 28, 0.1);
        }

        .reminder-biller {
            font-weight: 600;
            color: var(--text-dark);
        }

        .reminder-amount {
            font-weight: 700;
            color: var(--primary-purple);
        }

        .reminder-date {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .no-reminders {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 14px;
        }

        .profile-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: var(--primary-purple);
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .profile-area:hover {
            opacity: 0.8;
        }

        .profile-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-purple);
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            margin-bottom: 0;
            color: var(--primary-purple);
        }

        .card-title {
            font-weight: 700;
            font-size: 18px;
            margin: 0 0 15px 0;
            display: flex;
            align-items: center;
            color: var(--primary-purple);
        }

        .column-left {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-balance-card {
            background: var(--card);
            padding: 40px;
            color: var(--text-dark);
        }

        .main-balance-card h2 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: var(--primary-purple);
        }

        .balance-label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--primary-purple);
        }

        .balance-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .currency {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .masked-balance {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 5px;
            color: var(--text-dark);
        }

        .full-balance {
             font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: 0;
        }

        .sign-up-btn {
            background: var(--text-light);
            color: var(--primary-purple);
            border: 2px solid var(--primary-purple);
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            margin-left: auto;
            transition: background 0.15s;
        }
        .sign-up-btn:hover {
            background: var(--secondary-purple);
        }

        .quick-actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .action-btn {
            background: var(--primary-purple);
            color: var(--text-light);
            padding: 30px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            text-transform: uppercase;
            text-align: center;
            transition: transform 0.15s ease-out, box-shadow 0.15s ease-out, opacity 0.15s;
        }

        .action-btn:hover, .action-btn:focus {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            opacity: 0.95;
        }

        .action-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            opacity: 1;
        }

        .column-right {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chat-card {
            background: var(--primary-purple);
            color: var(--text-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
            padding: 20px 30px;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }
        .chat-card:hover {
            opacity: 0.9;
        }

        .chat-text {
            font-weight: 600;
            font-size: 20px;
            line-height: 1.3;
        }

        .chat-arrow {
            font-size: 30px;
            font-weight: 900;
        }

        .transactions-card {
            background: var(--card);
            padding: 20px 30px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .transactions-card h3 {
            color: var(--primary-purple);
            font-weight: 700;
            margin: 0;
        }

        .arrow-down {
            font-size: 18px;
            margin-left: 5px;
        }

        .tx-table {
            width: 100%;
            border-collapse: collapse;
            background: none;
            border-radius: 0;
            overflow: hidden;
            margin-top: 15px;
            color: var(--text-dark);
        }

        .tx-table th, .tx-table td {
            padding: 12px 0;
            border-bottom: 1px solid rgba(92, 45, 145, 0.1);
            font-size: 14px;
            text-align: left;
        }
        .tx-table th {
            color: var(--primary-purple);
            font-weight: 600;
            text-transform: uppercase;
        }
        .tx-table tbody tr:last-child td {
            border-bottom: none;
        }
        .tx-table td:nth-child(3) {
            font-weight: 600;
        }

        .income-text { color: var(--income); }
        .expense-text { color: var(--expense); }
        .neutral-text { color: var(--text-dark); }

        /* Reminders Card */
        .reminders-card {
            background: var(--card);
            padding: 20px 30px;
            margin-bottom: 20px;
        }

        .reminders-card h3 {
            color: var(--primary-purple);
            font-weight: 700;
            margin: 0 0 15px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal.visible {
            opacity: 1;
            pointer-events: all;
        }
        .modal-content {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            width: min(90%, 450px);
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transform: scale(0.95);
            transition: transform 0.3s ease;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal.visible .modal-content {
            transform: scale(1);
        }
        .modal-content .close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--primary-purple);
            padding: 5px;
        }
        .modal-content h3 {
            margin-top: 0;
            color: var(--primary-purple);
            font-size: 22px;
        }
        .modal-content label {
            display: block;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-purple);
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid rgba(92, 45, 145, 0.3);
            border-radius: 6px;
        }

        .modal-content p.error-message {
            color: var(--danger);
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        .modal-content button.primary {
            width: 100%;
            padding: 12px;
            margin-top: 25px;
            background: var(--primary-purple);
            color: var(--text-light);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            transition: background 0.2s;
        }
        .modal-content button.primary:hover {
            background: #4a2475;
        }
        .modal-content .muted {
            font-size: 12px;
            color: #777;
            margin-top: 10px;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: min(300px, 90vw);
            height: 100%;
            background: var(--card);
            z-index: 200;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.2);
            transform: translateX(100%);
            transition: transform 0.3s ease-in-out;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px 20px;
            border-bottom: 1px solid var(--secondary-purple);
        }

        .sidebar-header .profile-avatar {
            width: 60px;
            height: 60px;
            font-size: 20px;
            margin-bottom: 10px;
        }

        .sidebar-header .profile-name-large {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-purple);
            margin-bottom: 5px;
        }

        .sidebar-header .user-id {
            font-size: 12px;
            color: #777;
            word-break: break-all;
            text-align: center;
        }

        .sidebar-nav {
            flex-grow: 1;
            padding: 20px 0;
            list-style: none;
            margin: 0;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 15px 30px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            transition: background 0.2s, color 0.2s;
        }
        .sidebar-nav a:hover {
            background: var(--secondary-purple);
            color: var(--primary-purple);
        }
        .sidebar-nav a i {
            margin-right: 15px;
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--secondary-purple);
        }

        .logout-btn {
            width: 100%;
            background: var(--danger);
            color: var(--text-light);
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: background 0.2s;
        }
        .logout-btn:hover {
            background: #b42121;
        }

        .sidebar-close-btn {
            position: absolute;
            top: 15px;
            left: -40px;
            background: var(--primary-purple);
            color: var(--text-light);
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sidebar-close-btn:hover {
            background: #4a2475;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 150;
            display: none;
        }
        .sidebar-overlay.visible {
            display: block;
        }

        @media(max-width:900px){
            .topbar{padding:15px 20px;}
            .dashboard-grid{grid-template-columns:1fr; padding:20px;}
            .main-balance-card{padding:25px;}
            .main-balance-card h2{font-size:24px;}
            .currency, .masked-balance, .full-balance{font-size:24px;}
            .sign-up-btn{font-size:12px; padding:6px 15px;}
            .quick-actions-grid{grid-template-columns:1fr;}

            .sidebar-close-btn {
                left: initial;
                right: 15px;
                top: 15px;
                background: none;
                color: var(--primary-purple);
                box-shadow: none;
            }
        }
    </style>
</head>
<body>

    <div id="dashboardContainer">
        <header class="topbar">
            <div class="brand">
                <span class="logo-circle">AI</span>
                <h1>FinBud</h1>
            </div>
            <div class="topbar-right">
                <div class="bell-icon-container" id="bellIconToggle">
                    <i class="fas fa-bell bell-icon"></i>
                    <span class="reminder-badge" id="reminderBadge">2</span>
                </div>
                <div class="profile-area" id="profileAreaToggle">
                    <span class="profile-name" id="topbarUserName">Loading...</span>
                    <div class="profile-avatar" id="topbarAvatar">--</div>
                </div>
            </div>
        </header>

        <!-- Reminders Dropdown -->
        <div id="remindersDropdown" class="reminders-dropdown">
            <h3><i class="fas fa-bell"></i> Bill Reminders</h3>
            <div id="remindersContainer">
                <p class="no-reminders">Loading reminders...</p>
            </div>
        </div>

        <main class="dashboard-grid">

            <section class="column-left">

                <div class="card main-balance-card">
                    <h2 id="greetingName">Hello, User!</h2>
                    <p class="balance-label">YOUR BALANCE:</p>
                    <div class="balance-row">
                        <span class="currency">PKR</span>
                        <strong id="balanceDisplay" class="masked-balance">*****</strong>
                        <button class="sign-up-btn" id="balanceToggleBtn">SHOW BALANCE</button>
                    </div>
                </div>

                <div class="quick-actions-grid">
                    <button class="action-btn" data-action="send-money">SEND MONEY</button>
                    <button class="action-btn" data-action="pay-bill">PAY BILL</button>
                    <button class="action-btn" data-action="rewards">REWARDS</button>
                    <button class="action-btn" data-action="redeem-points">REDEEM POINTS</button>
                </div>
            </section>

            <section class="column-right">

                <button class="card chat-card" id="chatAiBtn">
                    <div class="chat-text">Chat With <br/> Your AI Assistant</div>
                    <span class="chat-arrow">→</span>
                </button>

                <div class="card transactions-card">
                    <h3 class="card-title">Recent Transactions <span class="arrow-down"><i class="fas fa-chevron-down"></i></span></h3>
                    <table id="txTable" class="tx-table">
                        <thead>
                            <tr><th>Date</th><th>Type</th><th>Amount</th></tr>
                        </thead>
                        <tbody id="txTableBody">
                            <tr><td colspan="3" style="text-align: center; color: #999;">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div id="sidebar" class="sidebar">
        <button id="closeSidebarBtn" class="sidebar-close-btn">×</button>

        <div class="sidebar-header">
            <div class="profile-avatar" id="sidebarAvatar">--</div>
            <span class="profile-name-large" id="sidebarUserName">User</span>
            <span class="user-id">User ID: <span id="sidebarUserId">Loading...</span></span>
        </div>

        <ul class="sidebar-nav">
            <li><a href="#" onclick="openProfileOverview(event)"><i class="fas fa-user-circle"></i> Profile Overview</a></li>
            <li><a href="#" onclick="openSettings(event)"><i class="fas fa-cog"></i> Settings</a></li>
            <li><a href="#" onclick="openSecurityCenter(event)"><i class="fas fa-shield-alt"></i> Security Center</a></li>
            <li><a href="#" onclick="openFinancialReports(event)"><i class="fas fa-chart-line"></i> Financial Reports</a></li>
        </ul>

        <div class="sidebar-footer">
            <button class="logout-btn" id="logoutBtn">LOG OUT</button>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <button id="closeModal" class="close">×</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let userData = {
            name: "User",
            initials: "U",
            balance: 0,
            isMasked: true,
            userId: "",
            points: 0,
            email: ""
        };

        // Load user data from backend
        async function loadUserData() {
            try {
                const response = await fetch('/api/user/data', {
                    method: 'GET',
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    throw new Error('Not authenticated');
                }
                
                const user = await response.json();
                
                userData = {
                    name: user.name,
                    initials: user.initials,
                    balance: user.balance,
                    isMasked: true,
                    userId: user.userId,
                    points: user.points,
                    email: user.email
                };
                
                updateUserUI();
                updateBalanceUI();
                loadTransactionHistory();
                loadReminders();
                
            } catch (error) {
                console.error('Error loading user data:', error);
                alert('Please log in to access the dashboard.');
                window.location.href = "/";
            }
        }

        // Load reminders (mock data for now)
        async function loadReminders() {
            const remindersContainer = document.getElementById('remindersContainer');
            
            // Mock data - will be replaced with API call later
            const mockReminders = [
                {
                    biller: "K-Electric",
                    amount: 3500,
                    due_date: "2025-11-15",
                    days_left: 3,
                    kind: "due_soon"
                },
                {
                    biller: "PTCL",
                    amount: 1200,
                    due_date: "2025-11-12",
                    days_left: 0,
                    kind: "due_today"
                }
            ];

            if (mockReminders.length === 0) {
                remindersContainer.innerHTML = '<p class="no-reminders">No upcoming bill reminders</p>';
                return;
            }

            let html = '';
            mockReminders.forEach(reminder => {
                const daysText = reminder.days_left === 0 ? 'Due Today' : 
                                reminder.days_left < 0 ? `${Math.abs(reminder.days_left)} days overdue` :
                                `Due in ${reminder.days_left} day${reminder.days_left > 1 ? 's' : ''}`;
                
                html += `
                    <div class="reminder-item ${reminder.kind}">
                        <div class="reminder-biller">${reminder.biller}</div>
                        <div class="reminder-amount">PKR ${reminder.amount.toLocaleString('en-PK')}</div>
                        <div class="reminder-date">${daysText} (${reminder.due_date})</div>
                    </div>
                `;
            });

            remindersContainer.innerHTML = html;
        }

        // Load transaction history
        async function loadTransactionHistory() {
            try {
                const response = await fetch('/api/transaction/history?limit=4', {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const tbody = document.getElementById('txTableBody');
                    tbody.innerHTML = '';
                    
                    if (data.transactions && data.transactions.length > 0) {
                        data.transactions.forEach(tx => {
                            const row = tbody.insertRow();
                            const amountClass = tx.amount < 0 ? 'expense-text' : 'income-text';
                            row.innerHTML = `
                                <td>${tx.date}</td>
                                <td>${tx.description}</td>
                                <td class="${amountClass}">PKR${Math.abs(tx.amount).toLocaleString('en-PK')}</td>
                            `;
                        });
                    } else {
                        tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #999;">No transactions yet</td></tr>';
                    }
                }
            } catch (error) {
                console.error('Error loading transactions:', error);
            }
        }

            dashboardContainer: document.getElementById('dashboardContainer'),
            modal: document.getElementById('modal'),
            modalBody: document.getElementById('modalBody'),
            closeModal: document.getElementById('closeModal'),
            sidebar: document.getElementById('sidebar'),
            sidebarOverlay: document.getElementById('sidebarOverlay'),
            profileAreaToggle: document.getElementById('profileAreaToggle'),
            closeSidebarBtn: document.getElementById('closeSidebarBtn'),
            balanceToggleBtn: document.getElementById('balanceToggleBtn'),
            balanceDisplay: document.getElementById('balanceDisplay'),
            txTableBody: document.getElementById('txTableBody'),
            actionButtons: document.querySelectorAll('.action-btn'),
            chatAiBtn: document.getElementById('chatAiBtn'),
            logoutBtn: document.getElementById('logoutBtn'),
            topbarUserName: document.getElementById('topbarUserName'),
            topbarAvatar: document.getElementById('topbarAvatar'),
            greetingName: document.getElementById('greetingName'),
            sidebarAvatar: document.getElementById('sidebarAvatar'),

            e.stopPropagation();
            DOMElements.remindersDropdown.classList.toggle('visible');
        });

        // Close reminders dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!DOMElements.remindersDropdown.contains(e.target) && 
                !DOMElements.bellIconToggle.contains(e.target)) {
                DOMElements.remindersDropdown.classList.remove('visible');
            }
        });

        function updateUserUI() {
            DOMElements.topbarUserName.textContent = userData.name;
            DOMElements.topbarAvatar.textContent = userData.initials;
            DOMElements.greetingName.textContent = `Hello, ${userData.name}!`;
            DOMElements.sidebarAvatar.textContent = userData.initials;
            DOMElements.sidebarUserName.textContent = userData.name;
            DOMElements.sidebarUserId.textContent = userData.userId;
        }

        // Initialize on load
        loadUserData();

        DOMElements.balanceToggleBtn.addEventListener('click', () => {
            if (userData.isMasked) {
                showPasswordPromptForBalance();
            } else {
                userData.isMasked = true;
                updateBalanceUI();
            }
        });

        function showPasswordPromptForBalance() {
            showModal(`
                <h3>Verify Your Password</h3>
                <p>Please enter your password to view your balance.</p>
                <form onsubmit="verifyPasswordForBalance(event)">
                    <label for="passwordInputBalance">Password</label>
                    <input type="password" id="passwordInputBalance" placeholder="Enter your password" required autofocus>
                    <p class="error-message" id="passwordErrorBalance">Incorrect password. Please try again.</p>
                    <button type="submit" class="primary">VERIFY</button>
                </form>
            `);
        }

        window.verifyPasswordForBalance = async function(event) {
            event.preventDefault();
            const passwordInput = document.getElementById('passwordInputBalance');
            const errorMsg = document.getElementById('passwordErrorBalance');
            
            try {
                const response = await fetch('/api/user/verify-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ password: passwordInput.value })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    userData.isMasked = false;
                    updateBalanceUI();
                    closeModal();
                } else {
                    errorMsg.style.display = 'block';
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (error) {
                console.error('Verification error:', error);
                alert('Server error. Please try again.');
            }
        };

        function updateBalanceUI() {
            const { balance, isMasked } = userData;
            const formattedBalance = new Intl.NumberFormat('en-PK').format(balance);

            if (isMasked) {
                DOMElements.balanceDisplay.textContent = '*****';
                DOMElements.balanceDisplay.className = 'masked-balance';
                DOMElements.balanceToggleBtn.textContent = 'SHOW BALANCE';
            } else {
                DOMElements.balanceDisplay.textContent = formattedBalance;
                DOMElements.balanceDisplay.className = 'full-balance';
                DOMElements.balanceToggleBtn.textContent = 'HIDE BALANCE';
            }
        }

        function openSidebar() {
            DOMElements.sidebar.classList.add('open');
            DOMElements.sidebarOverlay.classList.add('visible');
            DOMElements.dashboardContainer.classList.add('blurred-content');
        }

        function closeSidebar() {
            DOMElements.sidebar.classList.remove('open');
            DOMElements.sidebarOverlay.classList.remove('visible');
            DOMElements.dashboardContainer.classList.remove('blurred-content');
        }

        DOMElements.profileAreaToggle.addEventListener('click', openSidebar);
        DOMElements.closeSidebarBtn.addEventListener('click', closeSidebar);
        DOMElements.sidebarOverlay.addEventListener('click', closeSidebar);

        function closeModal() {
            DOMElements.modal.classList.remove('visible');
            DOMElements.dashboardContainer.classList.remove('blurred-content');
            DOMElements.modalBody.innerHTML = '';
        }

        DOMElements.closeModal.addEventListener('click', closeModal);
        DOMElements.modal.addEventListener('click', (e) => {
            if (e.target === DOMElements.modal) closeModal();
        });

        function showModal(content) {
            DOMElements.modalBody.innerHTML = content;
            if (!DOMElements.modal.classList.contains('visible')) {
                DOMElements.modal.classList.add('visible');
                DOMElements.dashboardContainer.classList.add('blurred-content');
            }
        }

        function showAlert(title, message, type = 'info') {
            const color = type === 'success' ? 'var(--income)' : type === 'error' ? 'var(--danger)' : 'var(--primary-purple)';
            showModal(`
                <h3 style="color: ${color};">${title}</h3>
                <p>${message}</p>
                <button class="primary" onclick="closeModal()">OK</button>
            `);
        }

        function showPasswordPrompt(action) {
            showModal(`
                <h3>Verify Your Password</h3>
                <p>Please enter your password to continue with this transaction.</p>
                <form onsubmit="verifyPassword(event, '${action}')">
                    <label for="passwordInput">Password</label>
                    <input type="password" id="passwordInput" placeholder="Enter your password" required autofocus>
                    <p class="error-message" id="passwordError">Incorrect password. Please try again.</p>
                    <button type="submit" class="primary">VERIFY</button>
                </form>
            `);
        }

        window.verifyPassword = async function(event, action) {
            event.preventDefault();
            const passwordInput = document.getElementById('passwordInput');
            const errorMsg = document.getElementById('passwordError');
            
            try {
                const response = await fetch('/api/user/verify-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ password: passwordInput.value })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showActionModal(action);
                } else {
                    errorMsg.style.display = 'block';
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (error) {
                console.error('Verification error:', error);
                alert('Server error. Please try again.');
            }
        };

        DOMElements.actionButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                const action = e.currentTarget.dataset.action;

                if (action === 'send-money' || action === 'pay-bill') {
                    showPasswordPrompt(action);
                } else {
                    showActionModal(action);
                }
            });
        });

        function showActionModal(action) {
            let content = '';

            switch (action) {
                case 'send-money':
                    content = `
                        <h3>Send Money</h3>
                        <form onsubmit="handleTransaction(event, 'transfer')">
                            <label for="recipient">Recipient Account/ID</label>
                            <input type="text" id="recipient" placeholder="e.g., ABC923001234567" required>
                            <label for="amount">Amount (PKR)</label>
                            <input type="number" id="amount" step="0.01" min="1" placeholder="e.g., 5000" required>
                            <label for="description">Description (Optional)</label>
                            <input type="text" id="description" placeholder="e.g., Dinner share">
                            <button type="submit" class="primary">CONFIRM TRANSFER</button>
                            <p class="muted">A fee may apply for cross-bank transfers.</p>
                        </form>
                    `;
                    break;

                case 'pay-bill':
                    content = `
                        <h3>Pay Bill</h3>
                        <form onsubmit="handleTransaction(event, 'bill')">
                            <label for="biller">Select Biller</label>
                            <select id="biller" required>
                                <option value="">Select...</option>
                                <option value="Electricity">Electricity</option>
                                <option value="Gas">Gas</option>
                                <option value="Internet">Internet</option>
                                <option value="Water">Water</option>
                            </select>
                            <label for="billId">Bill Reference Number</label>
                            <input type="text" id="billId" placeholder="Enter reference number" required>
                            <label for="billAmount">Amount (PKR)</label>
                            <input type="number" id="billAmount" step="0.01" min="10" placeholder="e.g., 6200" required>
                            <button type="submit" class="primary">PROCESS PAYMENT</button>
                        </form>
                    `;
                    break;

                case 'rewards':
                    content = `
                        <h3>FinBud Rewards Program</h3>
                        <h4 style="color: var(--income); margin: 20px 0;">Current Points: ${userData.points}</h4>
                        <p style="margin-bottom: 20px;">You earn 5 points for every PKR 1,000 spent via FinBud transfers or bill payments.</p>
                        <div style="background: var(--secondary-purple); padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                            <p style="margin: 10px 0;"><strong>1,000 Points:</strong> PKR 500 Cash Voucher</p>
                            <p style="margin: 10px 0;"><strong>2,500 Points:</strong> PKR 1,500 Utility Bill Discount</p>
                            <p style="margin: 10px 0;"><strong>5,000 Points:</strong> PKR 3,000 Shopping Voucher</p>
                        </div>
                        <button class="primary" onclick="closeModal()">GOT IT</button>
                    `;
                    break;

                case 'redeem-points':
                    content = `
                        <h3>Redeem Points</h3>
                        <h4 style="color: var(--income); margin: 20px 0;">Available Points: ${userData.points}</h4>
                        <form onsubmit="handleRedemption(event)">
                            <label for="redemption">Select Redemption Option</label>
                            <select id="redemption" required>
                                <option value="">Choose reward...</option>
                                <option value="500">PKR 500 Cash Voucher (1,000 Points)</option>
                                <option value="250">PKR 250 Bill Discount (500 Points)</option>
                            </select>
                            <button type="submit" class="primary">REDEEM NOW</button>
                            <p class="muted">Points will be deducted immediately upon redemption.</p>
                        </form>
                    `;
                    break;
            }

            showModal(content);
        }

        window.handleTransaction = async function(event, type) {
            event.preventDefault();
            const form = event.target;
            const amountInput = form.querySelector('#amount') || form.querySelector('#billAmount');
            const amount = parseFloat(amountInput.value);

            if (isNaN(amount) || amount <= 0) {
                return showAlert('Error', 'Please enter a valid positive amount.', 'error');
            }

            const transactionData = {
                type: type,
                amount: amount
            };

            if (type === 'transfer') {
                transactionData.recipient = form.querySelector('#recipient').value;
                transactionData.description = form.querySelector('#description').value;
            } else if (type === 'bill') {
                transactionData.biller = form.querySelector('#biller').value;
                transactionData.billId = form.querySelector('#billId').value;
            }

            try {
                const response = await fetch('/api/transaction/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(transactionData)
                });

                const data = await response.json();

                if (data.success) {
                    userData.balance = data.new_balance;
                    userData.points = data.new_points;
                    updateBalanceUI();

                    const transactionType = type === 'transfer' ? 'Transfer' : transactionData.biller;
                    const successMessage = type === 'transfer'
                        ? 'Your money has been transferred successfully!'
                        : `Your ${transactionType} bill has been paid successfully!`;

                    showModal(`
                        <div style="text-align: center; padding: 20px;">
                            <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--primary-purple); color: white; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 40px;">
                                ✓
                            </div>
                            <h3 style="color: var(--income); margin-bottom: 15px;">Transaction Successful!</h3>
                            <p style="font-size: 16px; margin-bottom: 10px;">${successMessage}</p>
                            <p style="font-size: 14px; color: #666; margin-bottom: 20px;">Amount: <strong>PKR ${amount.toLocaleString('en-PK')}</strong></p>
                            <p style="font-size: 14px; color: var(--primary-purple);">You earned ${data.points_earned} reward points!</p>
                            <button class="primary" onclick="closeModal()" style="margin-top: 20px;">DONE</button>
                        </div>
                    `);

                    loadTransactionHistory();
                    loadReminders();
                } else {
                    showAlert('Transaction Failed', data.message || 'Please try again.', 'error');
                }
            } catch (error) {
                console.error('Transaction error:', error);
                showAlert('Server Error', 'Unable to process transaction. Please try again.', 'error');
            }
        };

        window.handleRedemption = async function(event) {
            event.preventDefault();
            const form = event.target;
            const redemptionValue = parseInt(form.querySelector('#redemption').value);

            if (!redemptionValue) {
                return showAlert('Error', 'Please select a redemption option.', 'error');
            }

            try {
                const response = await fetch('/api/rewards/redeem', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ redemptionValue: redemptionValue })
                });

                const data = await response.json();

                if (data.success) {
                    userData.points = data.new_points;
                    userData.balance = data.new_balance;
                    updateBalanceUI();

                    closeModal();
                    showAlert(
                        'Redemption Successful!', 
                        `You redeemed ${data.points_redeemed} points for PKR ${data.reward_value}. New balance: PKR ${data.new_balance.toLocaleString('en-PK')}`, 
                        'success'
                    );

                    loadTransactionHistory();
                } else {
                    showAlert('Redemption Failed', data.message || 'Please try again.', 'error');
                }
            } catch (error) {
                console.error('Redemption error:', error);
                showAlert('Server Error', 'Unable to process redemption. Please try again.', 'error');
            }
        };

        DOMElements.chatAiBtn.addEventListener('click', () => {
            window.location.href = "/chat";
        });

        DOMElements.logoutBtn.addEventListener('click', async () => {
            closeSidebar();

            try {
                const response = await fetch('/api/auth/logout', {
                    method: 'POST',
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('Logged Out', 'You have been successfully logged out of FinBud.', 'success');

                    setTimeout(() => {
                        window.location.href = "/";
                    }, 1500);
                }
            } catch (error) {
                console.error('Logout error:', error);
                window.location.href = "/";
            }
        });

        window.openProfileOverview = function(event) {
            event.preventDefault();
            closeSidebar();
            showModal(`
                <h3><i class="fas fa-user-circle"></i> Profile Overview</h3>
                <div style="background: var(--secondary-purple); padding: 20px; border-radius: 8px; margin: 20px 0;">
                    <p style="margin: 10px 0;"><strong>Name:</strong> ${userData.name}</p>
                    <p style="margin: 10px 0;"><strong>User ID:</strong> ${userData.userId}</p>
                    <p style="margin: 10px 0;"><strong>Account Balance:</strong> PKR ${userData.balance.toLocaleString('en-PK')}</p>
                    <p style="margin: 10px 0;"><strong>Reward Points:</strong> ${userData.points}</p>
                    <p style="margin: 10px 0;"><strong>Email:</strong> ${userData.email}</p>
                </div>
                <button class="primary" onclick="closeModal()">CLOSE</button>
            `);
        };

        window.openSettings = function(event) {
            event.preventDefault();
            closeSidebar();
            showModal(`
                <h3><i class="fas fa-cog"></i> Settings</h3>
                <div style="margin: 20px 0;">
                    <div style="padding: 15px; border-bottom: 1px solid var(--secondary-purple); cursor: pointer;" onclick="alert('Feature coming soon!')">
                        <strong>Notifications</strong>
                        <p style="font-size: 13px; color: #666; margin: 5px 0 0 0;">Manage email and SMS alerts</p>
                    </div>
                    <div style="padding: 15px; border-bottom: 1px solid var(--secondary-purple); cursor: pointer;" onclick="alert('Feature coming soon!')">
                        <strong>Language & Region</strong>
                        <p style="font-size: 13px; color: #666; margin: 5px 0 0 0;">English (Pakistan)</p>
                    </div>
                    <div style="padding: 15px; border-bottom: 1px solid var(--secondary-purple); cursor: pointer;" onclick="alert('Feature coming soon!')">
                        <strong>Linked Accounts</strong>
                        <p style="font-size: 13px; color: #666; margin: 5px 0 0 0;">Connect external bank accounts</p>
                    </div>
                    <div style="padding: 15px; cursor: pointer;" onclick="alert('Feature coming soon!')">
                        <strong>Privacy Settings</strong>
                        <p style="font-size: 13px; color: #666; margin: 5px 0 0 0;">Control your data and sharing preferences</p>
                    </div>
                </div>
                <button class="primary" onclick="closeModal()">CLOSE</button>
            `);
        };

        window.openSecurityCenter = function(event) {
            event.preventDefault();
            closeSidebar();
            showModal(`
                <h3><i class="fas fa-shield-alt"></i> Security Center</h3>
                <div style="margin: 20px 0;">
                    <div style="padding: 15px; border-bottom: 1px solid var(--secondary-purple); cursor: pointer;" onclick="showChangePasswordForm()">
                        <strong>Change Password</strong>
                        <p style="font-size: 13px; color: #666; margin: 5px 0 0 0;">Update your account password</p>
                    </div>
                    <div style="padding: 15px; border-bottom: 1px solid var(--secondary-purple); cursor: pointer;" onclick="alert('Feature coming soon!')">
                        <strong>Two-Factor Authentication</strong>
                        <p style="font-size: 13px; color: #666; margin: 5px 0 0 0;">Add extra security to your account</p>
                    </div>
                    <div style="padding: 15px; border-bottom: 1px solid var(--secondary-purple); cursor: pointer;" onclick="alert('Feature coming soon!')">
                        <strong>Login History</strong>
                        <p style="font-size: 13px; color: #666; margin: 5px 0 0 0;">See recent account activity</p>
                    </div>
                    <div style="padding: 15px; cursor: pointer;" onclick="alert('Feature coming soon!')">
                        <strong>Trusted Devices</strong>
                        <p style="font-size: 13px; color: #666; margin: 5px 0 0 0;">Manage devices with account access</p>
                    </div>
                </div>
                <button class="primary" onclick="closeModal()">CLOSE</button>
            `);
        };

        window.showChangePasswordForm = function() {
            showModal(`
                <h3>Change Password</h3>
                <form onsubmit="handleChangePassword(event)">
                    <label for="currentPassword">Current Password</label>
                    <input type="password" id="currentPassword" placeholder="Enter current password" required>
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password" required minlength="4">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    <p class="error-message" id="passwordChangeError">Passwords do not match or current password is incorrect.</p>
                    <button type="submit" class="primary">UPDATE PASSWORD</button>
                </form>
            `);
        };

        window.handleChangePassword = async function(event) {
            event.preventDefault();
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('passwordChangeError');

            if (newPassword !== confirmPassword) {
                errorMsg.textContent = 'New passwords do not match.';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/user/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        currentPassword: currentPassword,
                        newPassword: newPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showModal(`
                        <div style="text-align: center; padding: 20px;">
                            <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--primary-purple); color: white; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 40px;">
                                ✓
                            </div>
                            <h3 style="color: var(--income); margin-bottom: 15px;">Password Updated!</h3>
                            <p style="font-size: 16px; margin-bottom: 10px;">Your password has been successfully changed.</p>
                            <button class="primary" onclick="closeModal()" style="margin-top: 20px;">DONE</button>
                        </div>
                    `);
                } else {
                    errorMsg.textContent = data.message || 'Password change failed';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error('Password change error:', error);
                errorMsg.textContent = 'Server error. Please try again.';
                errorMsg.style.display = 'block';
            }
        };

        window.openFinancialReports = async function(event) {
            event.preventDefault();
            closeSidebar();
            
            try {
                // Fetch spending data
                const response = await fetch('/api/financial/spending-category', {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    
                    let categoryHTML = '';
                    if (data.spending_by_category && Object.keys(data.spending_by_category).length > 0) {
                        for (const [category, amount] of Object.entries(data.spending_by_category)) {
                            categoryHTML += `
                                <div style="padding: 10px; border-bottom: 1px solid var(--secondary-purple);">
                                    <strong>${category}:</strong> PKR ${amount.toLocaleString('en-PK', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                                </div>
                            `;
                        }
                    } else {
                        categoryHTML = '<p style="text-align: center; color: #999;">No spending data available</p>';
                    }
                    
                    showModal(`
                        <h3><i class="fas fa-chart-line"></i> Financial Reports</h3>
                        <div style="margin: 20px 0;">
                            <h4 style="color: var(--primary-purple); margin-bottom: 15px;">Spending by Category</h4>
                            ${categoryHTML}
                        </div>
                        <button class="primary" onclick="closeModal()">CLOSE</button>
                    `);
                } else {
                    throw new Error('Failed to fetch financial data');
                }
            } catch (error) {
                console.error('Error loading financial reports:', error);
                showModal(`
                    <h3><i class="fas fa-chart-line"></i> Financial Reports</h3>
                    <p style="text-align: center; color: #999; padding: 20px;">Unable to load financial reports. Please try again later.</p>
                    <button class="primary" onclick="closeModal()">CLOSE</button>
                `);
            }
        };

        window.closeModal = closeModal;
    </script>
</body>
